name: Deploy Bedolaga Bot

on:
  push:
    branches:
      - main  # Срабатывает при пуше в ветку main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Подавляет предупреждение об устаревании Node.js 20

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}     # IP вашего сервера
          username: ${{ secrets.SERVER_USER }} # Логин (например, root)
          key: ${{ secrets.SSH_PRIVATE_KEY }}  # Приватный SSH ключ
          script: |
            # Переходим в папку проекта. Если секрет PROJECT_PATH не задан, используем путь по умолчанию.
            TARGET_DIR="${{ secrets.PROJECT_PATH }}"
            if [ -z "$TARGET_DIR" ]; then
              TARGET_DIR="/root/сервис рекламы с впн"
            fi

            echo "Переход в директорию: $TARGET_DIR"
            cd "$TARGET_DIR" || { echo "❌ Ошибка: Директория $TARGET_DIR не найдена на сервере."; exit 1; }

            echo "📥 Обновление кода из репозитория..."
            git pull origin main

            echo "🚀 Перезапуск Docker-контейнеров..."
            cd bot
            docker compose up -d --build

            echo "✅ Деплой успешно завершен!"
