# ==============================================================
# NGINX REVERSE PROXY ДЛЯ PRODUCTION
# ==============================================================
# Этот конфиг размещается на хост-сервере:
#   /etc/nginx/sites-available/mozhnovpn
#
# Обеспечивает:
# - lk.mozhnovpn.tech → Кабинет (порт 3020)
# - lk.mozhnovpn.tech/api/ → Bot API (порт 8080)
# - SSL через Let's Encrypt (Certbot)
#
# Установка:
#   sudo cp nginx/reverse-proxy.conf /etc/nginx/sites-available/mozhnovpn
#   sudo ln -s /etc/nginx/sites-available/mozhnovpn /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d lk.mozhnovpn.tech
# ==============================================================

# ============================================
# Кабинет + Bot API (lk.mozhnovpn.tech)
# ============================================
server {
    listen 80;
    server_name lk.mozhnovpn.tech;

    # Редирект на HTTPS (после настройки Certbot)
    # return 301 https://$host$request_uri;

    # ---- Кабинет (фронтенд) ----
    location / {
        proxy_pass http://127.0.0.1:3020;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ---- Bot API (для кабинета) ----
    # Кабинет обращается к /api/ → проксируем на бот :8080
    location /api/ {
        proxy_pass http://127.0.0.1:8080/cabinet/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Таймауты для длинных запросов
        proxy_connect_timeout 30s;
        proxy_read_timeout 120s;
        proxy_send_timeout 30s;
    }
}

